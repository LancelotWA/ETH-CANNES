version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eth-cannes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: eth-cannes-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "4000:4000"
    command: sh -c "npm install && npm run db:deploy --workspace @ethcannes/backend && npm run start:dev --workspace @ethcannes/backend"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: eth-cannes-frontend
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev --workspace @ethcannes/frontend"

volumes:
  postgres-data:
